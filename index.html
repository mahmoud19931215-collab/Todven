<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>Togven</title>

    <style>
      :root {
        --primary: #2ecc71;
        --secondary: #2c3e50;
        --bg-body: #f4f7f6;
        --bg-card: #ffffff;
        --text-main: #2c3e50;
        --text-muted: #7f8c8d;
        --border-color: #ecf0f1;
        --shadow: 0 4px 15px rgba(0,0,0,0.08);
      }

      [data-theme="dark"] {
        --bg-body: #1a1a1a;
        --bg-card: #2c2c2c;
        --text-main: #ecf0f1;
        --text-muted: #bdc3c7;
        --border-color: #3d3d3d;
      }

      * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
      
      body { 
        font-family: 'Segoe UI', Tahoma, sans-serif; 
        direction: rtl; 
        background-color: var(--bg-body); 
        margin: 0; 
        padding-bottom: 110px; 
        color: var(--text-main); 
      }

      .header { 
        background: var(--bg-card); 
        padding: 12px 15px; 
        position: sticky; 
        top: 0; 
        z-index: 1000; 
        display: flex; 
        gap: 10px; 
        align-items: center; 
        box-shadow: var(--shadow);
      }

      #search-input { 
        flex: 1; 
        padding: 10px 15px; 
        border-radius: 10px; 
        border: 1px solid var(--border-color); 
        outline: none; 
        background: var(--bg-body);
        color: var(--text-main);
      }

      .icon-btn { 
        background: var(--bg-body); 
        border: 1px solid var(--border-color); 
        color: var(--text-main); 
        width: 38px; 
        height: 38px; 
        border-radius: 10px; 
        cursor: pointer; 
        display: flex; 
        align-items: center; 
        justify-content: center;
      }

      .chips-wrapper { 
        display: flex; 
        overflow-x: auto; 
        padding: 12px 15px; 
        gap: 8px; 
        background: var(--bg-body); 
        position: sticky; 
        top: 62px; 
        z-index: 99; 
        scrollbar-width: none;
      }
      .chips-wrapper::-webkit-scrollbar { display: none; }

      .chip { 
        padding: 7px 18px; 
        border-radius: 50px; 
        background: var(--bg-card); 
        color: var(--text-muted); 
        white-space: nowrap; 
        border: 1px solid var(--border-color); 
        font-size: 13px; 
        font-weight: 600;
        cursor: pointer;
      }
      .chip.active { background: var(--primary); color: white; border-color: var(--primary); }

      .container { padding: 15px; max-width: 800px; margin: auto; }
      .category-header { font-size: 20px; font-weight: 800; margin: 25px 0 15px; padding-right: 12px; border-right: 5px solid var(--primary); }

      /* --- Loading Spinner --- */
      .loader { text-align: center; padding: 50px 20px; font-size: 18px; color: var(--text-muted); }

      /* --- Hero View --- */
      .product-container.hero-view .product-card {
        display: block;
        background: var(--bg-card);
        margin-bottom: 30px;
        border-radius: 25px;
        overflow: hidden;
        box-shadow: var(--shadow);
        border: 1px solid var(--border-color);
        text-align: center;
      }
      .product-container.hero-view .product-image {
        width: 100%;
        height: auto; 
        max-height: 45vh; 
        object-fit: contain; 
        background: #f9f9f9;
      }
      .product-container.hero-view .product-info { padding: 20px; }
      .product-container.hero-view .product-name { font-size: 22px; margin-bottom: 10px; font-weight: 800; }
      .product-container.hero-view .product-price { font-size: 18px; margin-bottom: 15px; display: block; }
      .product-container.hero-view .item-subtotal { font-size: 14px; margin-top: 10px; color: var(--text-muted); }
      .product-container.hero-view .quantity-controls { justify-content: center; gap: 20px; }
      .product-container.hero-view .btn-qty { width: 50px; height: 50px; font-size: 24px; }
      .product-container.hero-view .qty-input { font-size: 22px; width: 50px; }

      /* --- List View --- */
      .product-container.list-view .product-card {
        display: flex;
        align-items: center;
        padding: 10px;
        background: var(--bg-card);
        margin-bottom: 12px;
        border-radius: 15px;
        box-shadow: var(--shadow);
        border: 1px solid var(--border-color);
      }
      .product-container.list-view .product-image { width: 90px; height: 90px; border-radius: 12px; object-fit: cover; margin-left: 15px; }
      .product-container.list-view .product-info { flex: 1; display: flex; flex-direction: column; justify-content: center; }
      .product-container.list-view .product-name { font-size: 16px; margin-bottom: 5px; }
      .product-container.list-view .item-subtotal { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
      .product-container.list-view .quantity-controls { margin-top: 5px; justify-content: flex-start; gap: 10px; }
      .product-container.list-view .btn-qty { width: 32px; height: 32px; font-size: 18px; }

      .product-name { font-weight: 700; }
      .product-price { color: var(--primary); font-weight: 800; }

      .quantity-controls { display: flex; align-items: center; }
      .btn-qty { border-radius: 50%; border: none; background: var(--secondary); color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }
      .qty-input { text-align: center; border: none; background: transparent; color: var(--text-main); font-weight: 700; }

      .footer-cart { 
        position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
        width: 90%; max-width: 500px; background: var(--secondary); color: white; 
        padding: 12px 25px; border-radius: 20px; display: flex; justify-content: space-between; 
        align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 2000; 
        visibility: hidden; opacity: 0; 
      }
      .footer-cart.show { visibility: visible; opacity: 1; bottom: 30px; }
      .whatsapp-send { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px; }
    </style>
</head>
<body>

    <div class="header">
      <button class="icon-btn" onclick="toggleTheme()"><i id="theme-icon" class="fas fa-moon"></i></button>
      <button class="icon-btn" onclick="toggleView()"><i id="view-icon" class="fas fa-list"></i></button>
      <input type="text" id="search-input" placeholder="ابحث عما تريد..." onkeyup="filterProducts()">
    </div>

    <div class="chips-wrapper" id="category-chips">
        <div class="chip active" onclick="scrollToCategory('all', this)">الكل</div>
    </div>
    
    <div class="container product-container hero-view" id="main-container">
        <div class="loader" id="loader"><i class="fas fa-spinner fa-spin"></i> جاري تحميل المنتجات...</div>
    </div>

    <div class="footer-cart" id="footer-cart">
      <div>
        <div style="font-size: 12px; opacity: 0.8;">الإجمالي النهائي:</div>
        <div style="font-size: 18px; font-weight: 800;"><span id="grand-total">0</span> ل.س</div>
      </div>
      <button onclick="sendWhatsApp()" class="whatsapp-send">إتمام الطلب <i class="fab fa-whatsapp"></i></button>
    </div>

    <script>
      var targetNumber = "963945083365"; 
      var apiURL = "https://script.google.com/macros/s/AKfycbz8CnO-_aiuboqy7R4kXFA-FQ4uNaLAVc5-_aC-z6txmg2W33wG7c4Igj_NJeKGF-fk/exec"; 

      // جلب البيانات فور تحميل الصفحة
      document.addEventListener("DOMContentLoaded", function() {
        fetch(apiURL)
          .then(response => response.json())
          .then(data => {
              document.getElementById('loader').remove();
              renderData(data);
          })
          .catch(error => {
              document.getElementById('loader').innerHTML = "⚠️ عذراً، فشل تحميل البيانات. يرجى إعادة المحاولة.";
              console.error('Error:', error);
          });
      });

      function renderData(data) {
        const chipsWrapper = document.getElementById('category-chips');
        const mainContainer = document.getElementById('main-container');

        for (var category in data) {
          // إضافة الـ Chips
          let chipHtml = `<div class="chip" onclick="scrollToCategory('${category}', this)">${category}</div>`;
          chipsWrapper.insertAdjacentHTML('beforeend', chipHtml);

          // إضافة أقسام المنتجات
          let sectionHtml = `
            <div class="category-section" id="section-${category}">
              <div class="category-header">${category}</div>
            </div>`;
          mainContainer.insertAdjacentHTML('beforeend', sectionHtml);
          
          let sectionElement = document.getElementById(`section-${category}`);

          // إضافة كروت المنتجات داخل القسم الحالي
          data[category].forEach(item => {
            let productHtml = `
              <div class="product-card" data-name="${item.name}" data-price="${item.price}" data-stock="${item.stock}">
                <img class="product-image" src="${item.imageUrl}" onerror="this.src='https://via.placeholder.com/600x400?text=Aleppo+Delivery'">
                <div class="product-info">
                  <div class="product-name">${item.name}</div>
                  <div class="product-price">${item.price.toLocaleString()} ل.س </div>
                  <div class="item-subtotal" style="display: none;">المجموع: <span class="subtotal-val">0</span> ل.س</div>
                  <div class="quantity-controls">
                    <button class="btn-qty" style="background: var(--primary)" onclick="updateQty(this, 1)">+</button>
                    <input type="number" class="qty-input" value="0" readonly>
                    <button class="btn-qty" onclick="updateQty(this, -1)">-</button>
                  </div>
                </div>
              </div>`;
              sectionElement.insertAdjacentHTML('beforeend', productHtml);
          });
        }
      }

      function toggleTheme() {
        const body = document.body;
        const isDark = body.getAttribute('data-theme') === 'dark';
        body.setAttribute('data-theme', isDark ? 'light' : 'dark');
        document.getElementById('theme-icon').className = isDark ? 'fas fa-moon' : 'fas fa-sun';
      }

      function toggleView() {
        const container = document.getElementById('main-container');
        const icon = document.getElementById('view-icon');
        
        if (container.classList.contains('hero-view')) {
          container.classList.replace('hero-view', 'list-view');
          icon.className = 'fas fa-square';
        } else {
          container.classList.replace('list-view', 'hero-view');
          icon.className = 'fas fa-list';
        }
        filterProducts();
      }

      function updateQty(btn, delta) {
        var card = btn.closest('.product-card');
        var input = card.querySelector('.qty-input');
        var subtotalRow = card.querySelector('.item-subtotal');
        var subtotalVal = card.querySelector('.subtotal-val');
        
        var price = parseFloat(card.getAttribute('data-price'));
        var val = parseInt(input.value) + delta;

        if (val >= 0 && val <= (parseInt(card.getAttribute('data-stock')) || 999)) {
          input.value = val;
          
          if (val > 0) {
            subtotalRow.style.display = 'block';
            subtotalVal.innerText = (val * price).toLocaleString();
          } else {
            subtotalRow.style.display = 'none';
          }
          calculateTotal();
        }
      }

      function calculateTotal() {
        var total = 0, count = 0;
        document.querySelectorAll('.product-card').forEach(card => {
          var qty = parseInt(card.querySelector('.qty-input')?.value || 0);
          total += qty * parseFloat(card.getAttribute('data-price'));
          if(qty > 0) count++;
        });
        document.getElementById('grand-total').innerText = total.toLocaleString();
        document.getElementById('footer-cart').classList.toggle('show', count > 0);
      }

      function sendWhatsApp() {
        var message = "🛍️ *طلب جديد - Aleppo Delivery*\n";
        message += "--------------------------\n";
        
        var cartData = {}; 
        var prices = {};

        document.querySelectorAll('.product-card').forEach(card => {
          var name = card.getAttribute('data-name');
          var qty = parseInt(card.querySelector('.qty-input')?.value || 0);
          var price = parseFloat(card.getAttribute('data-price'));
          
          if (qty > 0) {
            if (cartData[name]) {
              cartData[name] += qty;
            } else {
              cartData[name] = qty;
              prices[name] = price;
            }
          }
        });

        for (var productName in cartData) {
          var q = cartData[productName];
          var p = prices[productName];
          var sub = q * p;
          message += `🔹 *${productName}*\n`;
          message += `   ${q} × ${p.toLocaleString()} = ${sub.toLocaleString()} ل.س\n`;
        }

        message += "--------------------------\n";
        message += `💰 *الإجمالي النهائي: ${document.getElementById('grand-total').innerText} ل.س*`;
        
        window.open("https://wa.me/" + targetNumber + "?text=" + encodeURIComponent(message));
      }

      function filterProducts() {
        var query = document.getElementById('search-input').value.toLowerCase();
        document.querySelectorAll('.product-card').forEach(card => {
          var name = card.getAttribute('data-name').toLowerCase();
          var isVisible = name.includes(query);
          if (document.getElementById('main-container').classList.contains('list-view')) {
             card.style.display = isVisible ? "flex" : "none";
          } else {
             card.style.display = isVisible ? "block" : "none";
          }
        });
      }

      function scrollToCategory(catName, chip) {
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        if (catName === 'all') { window.scrollTo({top: 0, behavior: 'smooth'}); return; }
        const el = document.getElementById('section-' + catName);
        window.scrollTo({ top: el.offsetTop - 120, behavior: 'smooth' });
      }
    </script>
</body>
</html>
