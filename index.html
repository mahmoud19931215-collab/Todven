<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>مشغل فيديوهات عمودي - سوريا</title>
  <style>
    /* ===== إعدادات الأداء والجمالية ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;           /* نمنع التمرير خارج الحاوية */
      background: #000;
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      touch-action: pan-y;        /* نسمح بالسحب العمودي فقط */
      -webkit-tap-highlight-color: transparent;
    }

    /* الحاوية الرئيسية التي تحوي السلايدات وتفعّل الـ snap */
    .feed-container {
      width: 100%;
      height: 100vh;             /* شاشة كاملة */
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch;  /* سلاسة على iOS */
      scrollbar-width: none;     /* إخفاء شريط التمرير */
      -ms-overflow-style: none;
      position: relative;
      background: #000;
    }
    .feed-container::-webkit-scrollbar {
      display: none;             /* إخفاء شريط التمرير على كروم وسفاري */
    }

    /* غلاف السلايدات – ارتفاعه يساوي عدد الفيديوهات × ارتفاع الشاشة */
    .slides-wrapper {
      position: relative;
      /* سنحدد الارتفاع عبر JS ليطابق عدد الفيديوهات */
      will-change: height;
    }

    /* السلايد الواحد */
    .slide {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      scroll-snap-align: start;  /* نقطة الالتقاط */
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    /* إذا كانت السلايدة فارغة نمنع الالتقاط بها */
    .slide.empty-slide {
      scroll-snap-align: none;
      pointer-events: none;      /* لا تستجيب للمس */
    }

    /* الفيديو يملأ السلايد بالكامل */
    .slide video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
    }

    /* زر كتم / تفعيل الصوت */
    .mute-btn {
      position: absolute;
      bottom: 20px;
      right: 20px;
      width: 44px;
      height: 44px;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      z-index: 10;
      border: 1px solid rgba(255,255,255,0.25);
      transition: 0.2s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .mute-btn:active {
      background: rgba(255,255,255,0.25);
      transform: scale(0.92);
    }

    /* مؤشر رقم الفيديو (اختياري، للتوضيح) */
    .video-index {
      position: absolute;
      bottom: 24px;
      left: 20px;
      color: rgba(255,255,255,0.8);
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 14px;
      z-index: 10;
      pointer-events: none;
    }

    /* تحميل أولي بسيط */
    .loader {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-size: 18px;
      z-index: 100;
      background: rgba(0,0,0,0.7);
      padding: 12px 24px;
      border-radius: 30px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="feed-container" id="feedContainer">
    <div class="slides-wrapper" id="slidesWrapper">
      <!-- سيتم إنشاء 3 سلايدات فقط ديناميكياً -->
    </div>
  </div>

  <div class="loader" id="loader">⏳ جاري تحميل الفيديوهات...</div>

  <script>
    (function() {
      // ==================== الميثاق الأساسي ====================
      // 3 عناصر فيديو فقط – DOM Recycling – أداء خارق على أضعف الأجهزة
      // =========================================================

      // ----- مصفوفة روابط الفيديوهات (ستُملأ لاحقاً من Google Sheets) -----
     let TOTAL_VIDEOS = 0;
const videoUrls = [];
const SHEET_API_URL = 'https://script.google.com/macros/s/AKfycbzHD_WS_HyoZO56CLuoA1APvjcqdeQTThvzB_KahER_YOkQnVCG-HDaNXtj46J56caF/exec'; // ضع رابط الـ Web App

async function fetchVideoLinks() {
  try {
    loader.style.display = 'block';
    const response = await fetch(SHEET_API_URL);
    if (!response.ok) throw new Error('فشل جلب البيانات');
    const urls = await response.json();
    
    if (urls.length === 0) {
      alert('لا توجد فيديوهات في القائمة');
      return;
    }
    
    // تحديث المصفوفات العالمية
    videoUrls.length = 0;
    videoUrls.push(...urls);
    TOTAL_VIDEOS = videoUrls.length;
    
    // إعادة بناء واجهة المشغل بالعدد الجديد
    setWrapperHeight();
    currentIndex = 0;
    updateSlides();
    resetScrollToMiddle();
    loader.style.display = 'none';
  } catch (error) {
    loader.innerHTML = '❌ فشل تحميل الفيديوهات. تأكد من الإتصال.';
    console.error(error);
  }
}

// استبدل استدعاء init() في النهاية بـ:
window.addEventListener('DOMContentLoaded', () => {
  setWrapperHeight();
  createSlides();
  // بدلاً من init() السابقة، نستدعي fetchVideoLinks التي ستملأ البيانات ثم تشغل
  fetchVideoLinks();
});

      // ----- عناصر الـ DOM الأساسية -----
      const feedContainer = document.getElementById('feedContainer');
      const slidesWrapper = document.getElementById('slidesWrapper');
      const loader = document.getElementById('loader');

      // ----- متغيرات الحالة -----
      let currentIndex = 0;               // الفهرس الحقيقي في المصفوفة (يبدأ من 0)
      const SLIDE_COUNT = 3;              // العدد الثابت للسلايدات (سابق – حالي – تالٍ)
      let slides = [];                    // عناصر السلايد
      let videoElements = [];             // عناصر <video> داخل كل سلايد
      let isUpdating = false;            // قفل لمنع التحديثات المتداخلة
      let scrollTimeout = null;
      let lastSnappedIndex = 1;          // آخر سلايد استقرينا عليه (0,1,2)

      // ----- إعداد ارتفاع الغلاف (عدد الفيديوهات × ارتفاع الشاشة) -----
      function setWrapperHeight() {
        const vh = window.innerHeight;
        slidesWrapper.style.height = (TOTAL_VIDEOS * vh) + 'px';
      }

      // ----- إنشاء السلايدات الثابتة (3 فقط) -----
      function createSlides() {
        slidesWrapper.innerHTML = '';
        for (let i = 0; i < SLIDE_COUNT; i++) {
          const slide = document.createElement('div');
          slide.className = 'slide';
          // نبدأ بإخفاء السلايدات الجانبية (ستظهر لاحقاً)
          if (i !== 1) slide.classList.add('empty-slide'); // الوسطى فقط نشطة في البداية

          // عنصر الفيديو
          const video = document.createElement('video');
          video.setAttribute('playsinline', '');
          video.setAttribute('webkit-playsinline', '');
          video.setAttribute('muted', '');          // مكتوم الصوت افتراضياً
          video.setAttribute('loop', '');           // تكرار (اختياري)
          video.setAttribute('preload', 'auto');    // تحميل مسبق للفيديوهات القريبة
          video.style.cssText = 'width:100%;height:100%;object-fit:cover;background:#000;';

          // زر كتم الصوت
          const muteBtn = document.createElement('div');
          muteBtn.className = 'mute-btn';
          muteBtn.innerHTML = '🔇';                 // أيقونة مبدئية (سيتم التحديث)
          muteBtn.setAttribute('aria-label', 'كتم / تفعيل الصوت');

          // مؤشر رقم الفيديو (اختياري)
          const indexBadge = document.createElement('div');
          indexBadge.className = 'video-index';
          indexBadge.textContent = '1 / ' + TOTAL_VIDEOS;

          slide.appendChild(video);
          slide.appendChild(muteBtn);
          slide.appendChild(indexBadge);
          slidesWrapper.appendChild(slide);

          slides.push(slide);
          videoElements.push(video);

          // حدث زر الكتم
          muteBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            const vid = video;
            if (vid.muted) {
              vid.muted = false;
              muteBtn.innerHTML = '🔊';
            } else {
              vid.muted = true;
              muteBtn.innerHTML = '🔇';
            }
          });
        }
      }

      // ----- تحديث محتوى السلايدات الثلاث حسب الفهرس الحالي -----
      function updateSlides() {
        if (isUpdating) return;
        isUpdating = true;

        const vh = window.innerHeight;
        const prevIndex = currentIndex - 1;
        const nextIndex = currentIndex + 1;

        // السلايد العلوي (السابق)
        if (prevIndex >= 0) {
          setSlideData(0, prevIndex, videoUrls[prevIndex]);
          slides[0].classList.remove('empty-slide');
          slides[0].style.top = (prevIndex * vh) + 'px';
        } else {
          // لا يوجد فيديو سابق – نخفي السلايد ونمنع الالتقاط
          setSlideEmpty(0);
          slides[0].style.top = '0px'; // خارج الرؤية
        }

        // السلايد الأوسط (الحالي) – دائماً نشط
        setSlideData(1, currentIndex, videoUrls[currentIndex]);
        slides[1].classList.remove('empty-slide');
        slides[1].style.top = (currentIndex * vh) + 'px';

        // السلايد السفلي (التالي)
        if (nextIndex < TOTAL_VIDEOS) {
          setSlideData(2, nextIndex, videoUrls[nextIndex]);
          slides[2].classList.remove('empty-slide');
          slides[2].style.top = (nextIndex * vh) + 'px';
        } else {
          setSlideEmpty(2);
          slides[2].style.top = ((TOTAL_VIDEOS - 1) * vh) + 'px'; // بعيد
        }

        // تشغيل الفيديو الحالي فقط، وإيقاف البقية
        playCurrentVideo();

        // تحديث شارة الفهرس لكل سلايد
        updateBadges();

        isUpdating = false;
      }

      function setSlideData(slideIdx, videoArrayIndex, url) {
        const video = videoElements[slideIdx];
        // تغيير المصدر فقط إذا كان مختلفاً لتجنب إعادة التحميل غير الضرورية
        if (video.src !== url) {
          video.src = url;
          video.load();
        }
        video.muted = true; // نعيد الكتم عند التبديل (وفقاً للميثاق)
        // تحديث زر الكتم
        const muteBtn = slides[slideIdx].querySelector('.mute-btn');
        if (muteBtn) muteBtn.innerHTML = '🔇';
      }

      function setSlideEmpty(slideIdx) {
        const video = videoElements[slideIdx];
        video.pause();
        video.removeAttribute('src');
        video.load();
        slides[slideIdx].classList.add('empty-slide');
        const muteBtn = slides[slideIdx].querySelector('.mute-btn');
        if (muteBtn) muteBtn.innerHTML = '🔇';
      }

      function playCurrentVideo() {
        // نوقف جميع الفيديوهات أولاً
        videoElements.forEach(v => v.pause());
        
        const currentVideo = videoElements[1]; // الأوسط هو الحالي
        if (currentVideo.src && currentVideo.src !== window.location.href) {
          currentVideo.currentTime = 0;
          currentVideo.play().catch(() => {
            // سياسة المتصفح قد تمنع التشغيل التلقائي، نتعامل بصمت
          });
        }
      }

      function updateBadges() {
        const prevIdx = currentIndex - 1;
        const nextIdx = currentIndex + 1;
        
        const badge0 = slides[0].querySelector('.video-index');
        const badge1 = slides[1].querySelector('.video-index');
        const badge2 = slides[2].querySelector('.video-index');
        
        if (badge0) badge0.textContent = prevIdx >= 0 ? `${prevIdx+1} / ${TOTAL_VIDEOS}` : '';
        if (badge1) badge1.textContent = `${currentIndex+1} / ${TOTAL_VIDEOS}`;
        if (badge2) badge2.textContent = nextIdx < TOTAL_VIDEOS ? `${nextIdx+1} / ${TOTAL_VIDEOS}` : '';
      }

      // ----- إعادة ضبط التمرير إلى السلايد الأوسط بعد الانتقال -----
      function resetScrollToMiddle() {
        const vh = window.innerHeight;
        const targetScrollTop = currentIndex * vh; // هذا يجعل السلايد الأوسط في موضعه الصحيح

        // نمنع السلاسة المؤقتة ليكون التصحيح فورياً
        feedContainer.style.scrollBehavior = 'auto';
        feedContainer.scrollTop = targetScrollTop;
        
        // نعيد سلوك التمرير الطبيعي (إن وجد، لكننا لم نضبط smooth)
        feedContainer.style.scrollBehavior = '';
        lastSnappedIndex = 1;
      }

      // ----- التعامل مع التمرير واكتشاف الانتقال إلى سلايد جانبي -----
      function handleScrollEnd() {
        if (isUpdating) return;
        
        const vh = window.innerHeight;
        const scrollTop = feedContainer.scrollTop;
        
        // حساب أقرب نقطة التقاط (slide index 0,1,2) بالنسبة للغلاف
        // لأن السلايدات موزعة على كامل ارتفاع الغلاف، نقسم على vh
        const nearestVideoIndex = Math.round(scrollTop / vh);
        
        // تحديد أي سلايد من الثلاثة يمثله هذا الموقع
        let snappedSlideLocalIndex;
        if (nearestVideoIndex === currentIndex) {
          snappedSlideLocalIndex = 1;  // الأوسط
        } else if (nearestVideoIndex === currentIndex - 1 && currentIndex > 0) {
          snappedSlideLocalIndex = 0;  // العلوي
        } else if (nearestVideoIndex === currentIndex + 1 && currentIndex < TOTAL_VIDEOS - 1) {
          snappedSlideLocalIndex = 2;  // السفلي
        } else {
          // انتقلنا خارج الحدود المسموحة (يحدث عند محاولة تجاوز البداية/النهاية)
          // نعيد التمرير إلى المنتصف فوراً
          resetScrollToMiddle();
          return;
        }

        // إذا استقر المستخدم على السلايد الأوسط، لا شيء نفعله
        if (snappedSlideLocalIndex === 1) {
          lastSnappedIndex = 1;
          return;
        }

        // انتقل إلى فيديو جديد (أعلى أو أسفل)
        if (snappedSlideLocalIndex === 0 && currentIndex > 0) {
          // انتقلنا للأعلى (الفيديو السابق)
          currentIndex--;
        } else if (snappedSlideLocalIndex === 2 && currentIndex < TOTAL_VIDEOS - 1) {
          // انتقلنا للأسفل (الفيديو التالي)
          currentIndex++;
        } else {
          // محاولة تجاوز الحدود – نمنعها
          resetScrollToMiddle();
          return;
        }

        // تحديث المحتوى (سيغير أماكن السلايدات ويرفعها للمواقع الجديدة)
        updateSlides();
        
        // إعادة ضبط موضع التمرير إلى المنتصف بعد التحديث
        resetScrollToMiddle();
      }

      // ----- مستمع التمرير مع تجميع الأحداث (Debounce) -----
      feedContainer.addEventListener('scroll', () => {
        // نلغي المؤقت السابق لننتظر حتى يتوقف التمرير
        if (scrollTimeout) clearTimeout(scrollTimeout);
        
        // نبدأ مؤقتاً جديداً: عندما يتوقف التمرير لمدة 100 مللي ثانية ننفذ المنطق
        scrollTimeout = setTimeout(() => {
          handleScrollEnd();
        }, 100);
      }, { passive: true });

      // دعم حدث `scrollend` الحديث إن وجد (يحسن الاستجابة)
      if ('onscrollend' in feedContainer) {
        feedContainer.addEventListener('scrollend', () => {
          if (scrollTimeout) {
            clearTimeout(scrollTimeout);
            scrollTimeout = null;
          }
          handleScrollEnd();
        });
      }

      // ----- التعامل مع تغيير أبعاد الشاشة (الدوران مثلاً) -----
      window.addEventListener('resize', () => {
        setWrapperHeight();
        // نعيد تموضع السلايدات حسب المؤشر الحالي
        const vh = window.innerHeight;
        if (slides[0] && !slides[0].classList.contains('empty-slide') && currentIndex > 0) {
          slides[0].style.top = ((currentIndex - 1) * vh) + 'px';
        }
        if (slides[1]) slides[1].style.top = (currentIndex * vh) + 'px';
        if (slides[2] && !slides[2].classList.contains('empty-slide') && currentIndex < TOTAL_VIDEOS - 1) {
          slides[2].style.top = ((currentIndex + 1) * vh) + 'px';
        }
        resetScrollToMiddle();
      });

      // ----- بدء التشغيل الأولي -----
      function init() {
        setWrapperHeight();
        createSlides();
        
        // ضبط السلايد الأول (الفيديو 0)
        currentIndex = 0;
        updateSlides();
        
        // وضع التمرير في المنتصف (يظهر السلايد الأوسط)
        resetScrollToMiddle();
        
        // إخفاء أي مؤشر تحميل
        loader.style.display = 'none';
      }

      // تشغيل التطبيق
      init();

      // ----- (اختياري) تحضير لدمج Google Sheets لاحقاً -----
      // async function fetchVideoLinksFromSheets() {
      //   const sheetId = 'YOUR_SHEET_ID';
      //   const apiKey = 'YOUR_API_KEY';
      //   const range = 'Sheet1!A:A'; // عمود الروابط
      //   const url = `https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/${range}?key=${apiKey}`;
      //   const response = await fetch(url);
      //   const data = await response.json();
      //   if (data.values) {
      //     videoUrls.length = 0;
      //     data.values.forEach(row => { if(row[0]) videoUrls.push(row[0]); });
      //     TOTAL_VIDEOS = videoUrls.length;
      //     setWrapperHeight();
      //     updateSlides();
      //   }
      // }

    })();
  </script>
</body>
</html>
