<!-- 
================================================================================
 المتجر ثلاثي الأبعاد بتجربة لعبة (CSS 3D Store)
 المطور: محمود
 التقنيات: HTML/CSS/JS خالص، Google Sheets كقاعدة بيانات
 الجزر البرمجية:
   1. جزيرة مشهد الـ 3D الرئيسية
   2. جزيرة واجهة المستخدم (HUD) - العملات، السلة، الإشعارات
   3. جزيرة تفاصيل المنتج (Modal)
   4. جزيرة السلة الجانبية
   5. جزيرة التحميل والاتصال بالشبكة
 ================================================================================
-->

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>متجر الزنزانة - Dungeon Shop</title>
<style>
/* ========== إعدادات عامة وأساسيات الجزيرة ========== */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg-dungeon: #1a0f0a;
  --gold: #d4af37;
  --pixel-border: 4px;
  --perspective: 1200px;
}

body {
  font-family: 'Courier New', monospace;
  background: var(--bg-dungeon);
  overflow: hidden;
  height: 100vh;
  width: 100vw;
  touch-action: none; /* تحكم كامل باللمس */
  user-select: none;
  -webkit-user-select: none;
  position: relative;
}

/* ---------- جزيرة مشهد الـ 3D ---------- */
.scene-container {
  width: 100%;
  height: 100%;
  perspective: var(--perspective);
  position: absolute;
  top: 0;
  left: 0;
}

.scene {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.1s ease-out;
  will-change: transform;
  /* الوضع الافتراضي - سنتحكم به بالماوس */
}

/* أرضية الزنزانة */
.floor {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 30%;
  background: linear-gradient(180deg, 
    rgba(30,20,15,0.9) 0%, 
    rgba(50,30,20,0.95) 40%, 
    rgba(20,10,5,1) 100%);
  transform: rotateX(60deg) translateZ(-80px);
  transform-origin: bottom center;
  box-shadow: inset 0 0 100px rgba(0,0,0,0.8);
  border-top: 2px solid #3a2a1a;
}

/* جدار خلفي */
.back-wall {
  position: absolute;
  top: 0;
  left: 50%;
  width: 80%;
  height: 70%;
  transform: translateX(-50%) translateZ(-300px) rotateY(0deg);
  background: linear-gradient(180deg, #2c1e12 0%, #1a1008 100%);
  border: 3px solid #4a3720;
  box-shadow: 0 0 80px rgba(0,0,0,0.7) inset;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2rem;
  color: #d4af37;
  text-shadow: 0 0 15px #ffaa00;
  opacity: 0.8;
  pointer-events: none;
}

/* قواعد المنتجات (pedestals) */
.pedestal {
  position: absolute;
  width: 160px;
  height: 200px;
  transform-style: preserve-3d;
  cursor: pointer;
  transition: transform 0.2s, filter 0.2s;
  /* الموقع سيتم تحديده ديناميكياً عبر JS */
}

.pedestal:hover {
  transform: translateZ(30px) scale(1.1);
  filter: drop-shadow(0 0 15px gold);
}

.product-card {
  width: 100%;
  height: 100%;
  position: relative;
  background: linear-gradient(145deg, #3a2a1a, #1e140a);
  border: 3px solid #6b4f2a;
  border-radius: 8px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.7), inset 0 0 30px rgba(0,0,0,0.5);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 10px;
  text-align: center;
  transform-style: preserve-3d;
}

/* أيقونة SVG بسيطة لكل منتج */
.product-icon {
  width: 60px;
  height: 60px;
  margin-bottom: 10px;
  filter: drop-shadow(0 0 8px #ffcc00);
}

.product-name {
  font-size: 1rem;
  font-weight: bold;
  color: #f4e3b1;
  text-shadow: 0 0 5px black;
  margin-bottom: 5px;
}

.product-price {
  font-size: 1.2rem;
  color: var(--gold);
  font-family: 'Courier New', monospace;
  text-shadow: 0 0 8px #daa520;
}

/* ---------- جزيرة HUD (واجهة المستخدم) ---------- */
.hud {
  position: fixed;
  top: 20px;
  left: 20px;
  right: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 100;
  pointer-events: none; /* نترك الأزرار تمرر الأحداث */
}

.hud > * {
  pointer-events: auto;
}

.coins-display, .cart-btn, .network-status {
  background: rgba(0,0,0,0.7);
  border: 2px solid #6b4f2a;
  color: var(--gold);
  padding: 8px 20px;
  font-family: 'Courier New', monospace;
  font-weight: bold;
  font-size: 1.2rem;
  backdrop-filter: blur(5px);
  border-radius: 8px;
  text-shadow: 0 0 8px #ffaa00;
  display: flex;
  align-items: center;
  gap: 8px;
}

.coins-display::before {
  content: "🪙";
  font-size: 1.5rem;
}

.cart-btn {
  cursor: pointer;
  background: rgba(212, 175, 55, 0.2);
  transition: all 0.2s;
}
.cart-btn:hover {
  background: rgba(212, 175, 55, 0.5);
}

.network-status.offline {
  color: #ff4444;
  border-color: #ff4444;
  text-shadow: 0 0 8px red;
}

/* ---------- جزيرة تفاصيل المنتج (Modal) ---------- */
.modal-overlay {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.85);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 200;
  backdrop-filter: blur(3px);
}

.modal-overlay.active {
  display: flex;
}

.modal {
  background: linear-gradient(135deg, #2c1e12, #1a0f08);
  border: 4px solid #b8942e;
  border-radius: 15px;
  padding: 30px;
  max-width: 400px;
  width: 90%;
  text-align: center;
  color: #f4e3b1;
  box-shadow: 0 0 50px rgba(212,175,55,0.5);
  transform-style: preserve-3d;
  animation: modalPop 0.3s ease-out;
}

@keyframes modalPop {
  from { transform: scale(0.8) translateZ(-100px); opacity: 0; }
  to { transform: scale(1) translateZ(0); opacity: 1; }
}

.modal .product-icon-large {
  width: 100px;
  height: 100px;
  margin: 0 auto 15px;
}

.modal h2 {
  font-size: 1.8rem;
  margin-bottom: 10px;
  text-shadow: 0 0 10px gold;
}

.modal .description {
  font-size: 0.9rem;
  margin: 15px 0;
  color: #ccc;
}

.modal .price-big {
  font-size: 2rem;
  color: var(--gold);
  margin: 15px 0;
}

.add-to-cart-btn, .close-modal-btn {
  background: linear-gradient(180deg, #b8942e, #7a5c1e);
  border: none;
  color: black;
  font-weight: bold;
  padding: 12px 30px;
  margin: 5px;
  font-size: 1.2rem;
  cursor: pointer;
  border-radius: 8px;
  text-transform: uppercase;
  transition: 0.2s;
}
.add-to-cart-btn:hover {
  background: linear-gradient(180deg, #d4af37, #9e7b2a);
}

.close-modal-btn {
  background: #444;
  color: white;
}
.close-modal-btn:hover {
  background: #666;
}

/* ---------- جزيرة السلة الجانبية ---------- */
.cart-panel {
  position: fixed;
  top: 0;
  right: -320px;
  width: 300px;
  height: 100%;
  background: rgba(20, 10, 5, 0.95);
  border-left: 4px solid #b8942e;
  z-index: 300;
  transition: right 0.3s ease;
  display: flex;
  flex-direction: column;
  backdrop-filter: blur(10px);
  color: #f4e3b1;
  padding: 20px;
}

.cart-panel.open {
  right: 0;
}

.cart-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 2px solid #b8942e;
  padding-bottom: 10px;
}
.cart-items-list {
  flex: 1;
  overflow-y: auto;
  margin: 15px 0;
}
.cart-item {
  display: flex;
  justify-content: space-between;
  margin: 10px 0;
  font-size: 0.9rem;
}
.cart-total {
  font-size: 1.3rem;
  font-weight: bold;
  border-top: 2px solid #b8942e;
  padding-top: 10px;
}
.checkout-btn {
  background: #d4af37;
  color: black;
  font-weight: bold;
  padding: 10px;
  border: none;
  cursor: pointer;
}

/* ---------- جزيرة التحميل ---------- */
.loading-screen {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: #0a0604;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 999;
  transition: opacity 0.5s;
}
.loading-bar {
  width: 200px;
  height: 20px;
  border: 3px solid #d4af37;
  background: #222;
  margin-top: 20px;
}
.loading-progress {
  height: 100%;
  width: 0%;
  background: #d4af37;
  transition: width 0.2s;
}
</style>
</head>
<body>

<!-- ========== جزيرة مشهد الـ 3D ========== -->
<div class="scene-container" id="sceneContainer">
  <div class="scene" id="scene">
    <div class="floor"></div>
    <div class="back-wall">⚔️ DUNGEON SHOP ⚔️</div>
    <!-- سيتم إدراج قواعد المنتجات (pedestals) ديناميكياً عبر JS -->
  </div>
</div>

<!-- ========== جزيرة HUD ========== -->
<div class="hud">
  <div class="coins-display" id="coinsDisplay">0</div>
  <div class="cart-btn" id="cartBtn">🛒 السلة (<span id="cartCount">0</span>)</div>
  <div class="network-status" id="networkStatus">⛓️ متصل</div>
</div>

<!-- ========== جزيرة تفاصيل المنتج (Modal) ========== -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="product-icon-large" id="modalIcon"></div>
    <h2 id="modalName"></h2>
    <p class="description" id="modalDesc"></p>
    <div class="price-big" id="modalPrice"></div>
    <button class="add-to-cart-btn" id="modalAddToCart">🛒 أضف إلى السلة</button>
    <button class="close-modal-btn" id="modalClose">إغلاق</button>
  </div>
</div>

<!-- ========== جزيرة السلة الجانبية ========== -->
<div class="cart-panel" id="cartPanel">
  <div class="cart-header">
    <h3>🎒 حقيبة المغامر</h3>
    <button class="close-modal-btn" id="closeCartBtn">✖</button>
  </div>
  <div class="cart-items-list" id="cartItemsList"></div>
  <div class="cart-total">المجموع: <span id="cartTotal">0</span> 🪙</div>
  <button class="checkout-btn" id="checkoutBtn">شراء (محاكاة)</button>
</div>

<!-- ========== جزيرة التحميل ========== -->
<div class="loading-screen" id="loadingScreen">
  <h1 style="color:#d4af37; text-shadow:0 0 20px;">⚔️ جارٍ دخول الزنزانة ⚔️</h1>
  <div class="loading-bar"><div class="loading-progress" id="loadingProgress"></div></div>
</div>

<script>
// ======================== المنطق البرمجي الرئيسي ========================
// جميع الجزر تتعامل مع بعضها عبر كائن State مركزي

// ---------- بيانات البيئة والتكوين ----------
const CONFIG = {
  // استبدل هذا الرابط برابط تطبيق Google Apps Script الخاص بك بعد نشره
  GOOGLE_SHEETS_API_URL: 'https://script.google.com/macros/s/AKfycbw7xX6pL3kQN2vY9z1R5tFgH8jK4dM0aWxQyZ6bV2cL/exec', // مثال، غير صالح
  CACHE_KEY_PRODUCTS: 'dungeon_shop_products',
  CACHE_KEY_CART: 'dungeon_shop_cart',
  CACHE_KEY_COINS: 'dungeon_shop_coins',
  FALLBACK_PRODUCTS: [
    { id: 1, name: 'سيف التنين', realName: 'فأرة ألعاب RGB', price: 150, category: 'أسلحة', icon: '🗡️' },
    { id: 2, name: 'درع الظلام', realName: 'سماعة رأس احترافية', price: 220, category: 'دروع', icon: '🎧' },
    { id: 3, name: 'قوس النور', realName: 'لوحة مفاتيح ميكانيكية', price: 180, category: 'أسلحة', icon: '⌨️' },
    { id: 4, name: 'زجاجة مانا', realName: 'مشروب طاقة', price: 15, category: 'جرعات', icon: '🧪' },
    { id: 5, name: 'خاتم الاختفاء', realName: 'قميص جيمر أسود', price: 75, category: 'قطع أثرية', icon: '👕' },
    { id: 6, name: 'كرة النار', realName: 'مكبر صوت بلوتوث', price: 95, category: 'أسلحة', icon: '🔊' }
  ],
  PRODUCTS_PER_VIEW: 6
};

// ---------- إدارة الحالة العامة ----------
const state = {
  products: [],
  cart: [],
  coins: 0,
  isOnline: navigator.onLine,
  isLoading: true,
  currentView: 0 // فهرس الصفحة للمنتجات المعروضة
};

// ---------- دوال التخزين المؤقت ----------
const Storage = {
  get(key, fallback) {
    try {
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : fallback;
    } catch(e) { return fallback; }
  },
  set(key, value) {
    try { localStorage.setItem(key, JSON.stringify(value)); } catch(e) {}
  }
};

// ---------- محاكاة عملات اللعبة ----------
function initCoins() {
  state.coins = Storage.get(CONFIG.CACHE_KEY_COINS, 500); // يبدأ اللاعب بـ 500 عملة
  updateCoinsDisplay();
}
function addCoins(amount) {
  state.coins += amount;
  Storage.set(CONFIG.CACHE_KEY_COINS, state.coins);
  updateCoinsDisplay();
}
function deductCoins(amount) {
  if (state.coins >= amount) {
    state.coins -= amount;
    Storage.set(CONFIG.CACHE_KEY_COINS, state.coins);
    updateCoinsDisplay();
    return true;
  }
  return false;
}

// ---------- تحديث واجهة HUD ----------
function updateCoinsDisplay() {
  document.getElementById('coinsDisplay').textContent = state.coins;
}
function updateCartBadge() {
  const count = state.cart.reduce((sum, item) => sum + item.quantity, 0);
  document.getElementById('cartCount').textContent = count;
}
function updateNetworkStatus() {
  const el = document.getElementById('networkStatus');
  if (state.isOnline) {
    el.textContent = '⛓️ متصل';
    el.classList.remove('offline');
  } else {
    el.textContent = '⚠️ غير متصل';
    el.classList.add('offline');
  }
}

// ---------- جلب المنتجات من Google Sheets مع تخزين مؤقت ----------
async function fetchProducts() {
  // محاولة استخدام البيانات المخزنة محلياً أولاً (تحميل فوري)
  const cached = Storage.get(CONFIG.CACHE_KEY_PRODUCTS, null);
  if (cached) {
    state.products = cached;
    renderProducts();
    finishLoading();
  }

  // في الخلفية، جلب آخر التحديثات إن كان متصلاً
  if (state.isOnline) {
    try {
      const response = await fetch(CONFIG.GOOGLE_SHEETS_API_URL);
      if (!response.ok) throw new Error('Network response was not ok');
      const data = await response.json();
      if (data && data.length > 0) {
        state.products = data;
        Storage.set(CONFIG.CACHE_KEY_PRODUCTS, data);
        if (cached) renderProducts(); // إعادة العرض إذا اختلفت
        else renderProducts();
      }
    } catch (err) {
      console.warn('فشل جلب البيانات من Google Sheets، استخدام المحلي:', err);
      if (!state.products.length) {
        // لا بيانات مخزنة، استخدم البيانات الافتراضية
        state.products = CONFIG.FALLBACK_PRODUCTS;
        renderProducts();
      }
    }
  } else {
    // بدون اتصال، اعرض المخزن محلياً أو الافتراضي
    if (!state.products.length) {
      state.products = CONFIG.FALLBACK_PRODUCTS;
      renderProducts();
    }
  }
  finishLoading();
}

function finishLoading() {
  state.isLoading = false;
  document.getElementById('loadingScreen').style.opacity = '0';
  setTimeout(() => {
    document.getElementById('loadingScreen').style.display = 'none';
  }, 500);
}

// ---------- عرض المنتجات في مشهد 3D ----------
const scene = document.getElementById('scene');
let pedestals = [];

function renderProducts() {
  // إزالة القواعد القديمة
  pedestals.forEach(p => p.remove());
  pedestals = [];

  // اختيار مجموعة المنتجات حسب الصفحة الحالية
  const start = state.currentView * CONFIG.PRODUCTS_PER_VIEW;
  const subset = state.products.slice(start, start + CONFIG.PRODUCTS_PER_VIEW);
  if (subset.length === 0) return;

  // حساب إحداثيات ثلاثية الأبعاد بشكل دائري أو شبكي
  const radius = 250;
  const angleStep = (Math.PI * 2) / subset.length;
  
  subset.forEach((product, index) => {
    const angle = angleStep * index - Math.PI/2; // نبدأ من الأعلى
    const x = Math.cos(angle) * radius;
    const z = Math.sin(angle) * radius - 100; // للخلف قليلاً
    const y = -20; // ارتفاع القاعدة

    const pedestal = document.createElement('div');
    pedestal.className = 'pedestal';
    pedestal.style.left = '50%';
    pedestal.style.top = '50%';
    pedestal.style.transform = `translate3d(${x}px, ${y}px, ${z}px)`;
    pedestal.dataset.productId = product.id;
    pedestal.innerHTML = `
      <div class="product-card">
        <div class="product-icon">${product.icon || '📦'}</div>
        <div class="product-name">${product.name}</div>
        <div class="product-price">${product.price} 🪙</div>
      </div>
    `;
    pedestal.addEventListener('click', () => openProductModal(product));
    scene.appendChild(pedestal);
    pedestals.push(pedestal);
  });
}

// ---------- جزيرة التحكم بالماوس (دوران المشهد 3D) ----------
const sceneContainer = document.getElementById('sceneContainer');
let mouseX = 0, mouseY = 0;
let targetRotX = 0, targetRotY = 0;
let currentRotX = 0, currentRotY = 0;

sceneContainer.addEventListener('mousemove', (e) => {
  const rect = sceneContainer.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  // تحويل الإحداثيات إلى زوايا (نطاق -15 إلى 15 درجة مثلاً)
  targetRotY = ((x / rect.width) - 0.5) * 20;
  targetRotX = ((y / rect.height) - 0.5) * -10;
});

// للأجهزة اللمسية
sceneContainer.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const touch = e.touches[0];
  const rect = sceneContainer.getBoundingClientRect();
  const x = touch.clientX - rect.left;
  const y = touch.clientY - rect.top;
  targetRotY = ((x / rect.width) - 0.5) * 20;
  targetRotX = ((y / rect.height) - 0.5) * -10;
}, { passive: false });

// حلقة التحديث للحركة السلسة
function animateScene() {
  // تقريب تدريجي (LERP)
  currentRotY += (targetRotY - currentRotY) * 0.1;
  currentRotX += (targetRotX - currentRotX) * 0.1;
  scene.style.transform = `rotateX(${currentRotX}deg) rotateY(${currentRotY}deg)`;
  requestAnimationFrame(animateScene);
}
animateScene();

// ---------- جزيرة تفاصيل المنتج ----------
const modalOverlay = document.getElementById('modalOverlay');
let currentModalProduct = null;

function openProductModal(product) {
  currentModalProduct = product;
  document.getElementById('modalIcon').innerHTML = product.icon || '📦';
  document.getElementById('modalName').textContent = product.name;
  document.getElementById('modalDesc').textContent = product.realName || 'منتج مادي بجودة أسطورية';
  document.getElementById('modalPrice').textContent = `${product.price} 🪙`;
  modalOverlay.classList.add('active');
}

function closeModal() {
  modalOverlay.classList.remove('active');
  currentModalProduct = null;
}

document.getElementById('modalClose').addEventListener('click', closeModal);
modalOverlay.addEventListener('click', (e) => {
  if (e.target === modalOverlay) closeModal();
});

// إضافة إلى السلة من النافذة
document.getElementById('modalAddToCart').addEventListener('click', () => {
  if (currentModalProduct) {
    addToCart(currentModalProduct);
    closeModal();
  }
});

// ---------- إدارة السلة ----------
function loadCart() {
  state.cart = Storage.get(CONFIG.CACHE_KEY_CART, []);
  updateCartBadge();
}

function saveCart() {
  Storage.set(CONFIG.CACHE_KEY_CART, state.cart);
  updateCartBadge();
}

function addToCart(product) {
  const existing = state.cart.find(item => item.id === product.id);
  if (existing) {
    existing.quantity++;
  } else {
    state.cart.push({ ...product, quantity: 1 });
  }
  saveCart();
  showFloatingMessage(`تمت إضافة ${product.name} إلى الحقيبة!`);
}

function removeFromCart(productId) {
  state.cart = state.cart.filter(item => item.id !== productId);
  saveCart();
  renderCartItems();
}

// عرض السلة الجانبية
const cartPanel = document.getElementById('cartPanel');
document.getElementById('cartBtn').addEventListener('click', () => {
  cartPanel.classList.toggle('open');
  renderCartItems();
});
document.getElementById('closeCartBtn').addEventListener('click', () => {
  cartPanel.classList.remove('open');
});

function renderCartItems() {
  const list = document.getElementById('cartItemsList');
  list.innerHTML = '';
  state.cart.forEach(item => {
    const div = document.createElement('div');
    div.className = 'cart-item';
    div.innerHTML = `
      <span>${item.icon} ${item.name} x${item.quantity}</span>
      <span>${item.price * item.quantity} 🪙</span>
      <button class="close-modal-btn" style="padding:0 5px;" data-id="${item.id}">✖</button>
    `;
    div.querySelector('button').addEventListener('click', (e) => {
      e.stopPropagation();
      removeFromCart(item.id);
    });
    list.appendChild(div);
  });
  const total = state.cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
  document.getElementById('cartTotal').textContent = total;
}

// زر الدفع الوهمي
document.getElementById('checkoutBtn').addEventListener('click', () => {
  const total = state.cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
  if (total === 0) return alert('حقيبتك فارغة!');
  if (deductCoins(total)) {
    alert(`لقد اشتريت الأغراض بقيمة ${total} عملة! (محاكاة)`);
    state.cart = [];
    saveCart();
    renderCartItems();
    cartPanel.classList.remove('open');
  } else {
    alert('ليس لديك عملات كافية! أكمل المهام لتربح المزيد.');
  }
});

// رسالة عائمة
function showFloatingMessage(text) {
  const msg = document.createElement('div');
  msg.style.position = 'fixed';
  msg.style.bottom = '20px';
  msg.style.left = '50%';
  msg.style.transform = 'translateX(-50%)';
  msg.style.background = '#d4af37';
  msg.style.color = 'black';
  msg.style.padding = '10px 25px';
  msg.style.borderRadius = '20px';
  msg.style.fontWeight = 'bold';
  msg.style.zIndex = '500';
  msg.textContent = text;
  document.body.appendChild(msg);
  setTimeout(() => msg.remove(), 2000);
}

// ---------- إدارة حالة الشبكة ----------
window.addEventListener('online', () => {
  state.isOnline = true;
  updateNetworkStatus();
  fetchProducts(); // تحديث فوري
});
window.addEventListener('offline', () => {
  state.isOnline = false;
  updateNetworkStatus();
});

// ---------- محاكاة تحميل تدريجي (للمظهر فقط) ----------
let loadProgress = 0;
const progressBar = document.getElementById('loadingProgress');
function simulateLoading() {
  if (loadProgress < 100) {
    loadProgress += Math.random() * 15;
    if (loadProgress > 100) loadProgress = 100;
    progressBar.style.width = loadProgress + '%';
    setTimeout(simulateLoading, 200);
  }
}
simulateLoading();

// ---------- بدء التشغيل ----------
async function init() {
  updateNetworkStatus();
  loadCart();
  initCoins();
  await fetchProducts(); // هذا سينهي التحميل عند الجلب أو استخدام الكاش
  // إذا لم تنته fetchProducts بسرعة، سننهي التحميل بعد 2.5 ثانية كحد أقصى
  setTimeout(() => {
    if (state.isLoading) finishLoading();
  }, 2500);
}

init();
</script>
