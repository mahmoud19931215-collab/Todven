<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://unpkg.com/dexie@3.2.4/dist/dexie.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <title>Togven</title>
</head>
<body>

    <!-- طبقة الخلفية المتحركة (غيوم + شمس + قمر) -->
    <div class="background-animation">
        <!-- عناصر النهار (شمس + غيوم) -->
        <div class="day-elements">
            <div class="sun"></div>
            <div class="cloud cloud1"></div>
            <div class="cloud cloud2"></div>
            <div class="cloud cloud3"></div>
            <div class="cloud cloud4"></div>
        </div>
        <!-- عناصر الليل (قمر + نجوم) -->
        <div class="night-elements" style="display: none;">
            <div class="moon"></div>
            <div class="star star1"></div>
            <div class="star star2"></div>
            <div class="star star3"></div>
            <div class="star star4"></div>
            <div class="star star5"></div>
            <div class="star star6"></div>
        </div>
    </div>

    <!-- رأس التطبيق (بدون أزرار الصوت، الملف الشخصي، الإعدادات) -->
    <div class="header">
        <div class="logo-area">
            <svg class="animated-logo" width="40" height="40" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="45" fill="none" stroke="#2ecc71" stroke-width="4" stroke-dasharray="283" stroke-dashoffset="70">
                    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="4s" repeatCount="indefinite" />
                </circle>
                <polygon points="50,20 61,40 85,45 68,62 72,86 50,75 28,86 32,62 15,45 39,40" fill="#f1c40f" stroke="#e67e22" stroke-width="2">
                    <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite" />
                </polygon>
                <text x="50" y="68" text-anchor="middle" fill="#2c3e50" font-size="20" font-weight="bold" font-family="Arial">T</text>
            </svg>
            <span class="app-name">Togven</span>
        </div>
        <div class="header-actions">
            <button class="icon-btn" id="themeToggleBtn"><i id="theme-icon" class="fas fa-moon"></i></button>
            <div class="cart-icon-wrapper">
                <button class="icon-btn" id="cartIconBtn" title="عربة التسوق">
                    <i class="fas fa-shopping-cart"></i>
                    <span id="cartCount" class="cart-count">0</span>
                </button>
            </div>
        </div>
        <div class="search-wrapper">
            <input type="text" id="search-input" placeholder="ابحث عما تريد...">
            <button id="clearSearchBtn" class="clear-search-btn" style="display: none;">✖</button>
        </div>
        <div id="searchResultCount" class="search-result-count"></div>
    </div>

    <!-- أزرار التصنيفات -->
    <div class="chips-wrapper" id="category-chips">
        <div class="chip active" data-category="all">الكل</div>
    </div>

    <!-- شريط تقدم تحميل الصور -->
    <div id="imageProgressBar" class="image-progress-bar" style="display: none;">
        <div class="image-progress-fill" style="width:0%"></div>
    </div>

    <!-- حاوية المنتجات مع Skeleton Loading -->
    <div class="container product-container hero-view" id="main-container">
        <div class="skeleton-container" id="skeletonContainer">
            <div class="skeleton-card"><div class="skeleton-image"></div><div class="skeleton-line"></div><div class="skeleton-line short"></div></div>
            <div class="skeleton-card"><div class="skeleton-image"></div><div class="skeleton-line"></div><div class="skeleton-line short"></div></div>
            <div class="skeleton-card"><div class="skeleton-image"></div><div class="skeleton-line"></div><div class="skeleton-line short"></div></div>
        </div>
        <div id="productsContent" style="display: none;"></div>
    </div>

    <!-- فوتر السلة -->
    <div class="footer-cart" id="footer-cart">
        <div>
            <div style="font-size: 12px; opacity: 0.8;">الإجمالي النهائي:</div>
            <div style="font-size: 18px; font-weight: 800;"><span id="grand-total">0</span> ل.س</div>
        </div>
        <button id="whatsappBtn" class="whatsapp-send">إتمام الطلب <i class="fab fa-whatsapp"></i></button>
    </div>

    <!-- صفحة عدم الاتصال -->
    <div id="offlinePage" class="offline-page" style="display: none;">
        <i class="fas fa-wifi-slash"></i>
        <h2>أنت غير متصل بالإنترنت</h2>
        <p>يرجى التحقق من اتصالك ثم إعادة المحاولة.</p>
        <button id="retryConnectionBtn">إعادة المحاولة</button>
    </div>

    <script src="app.js" type="module"></script>
</body>
</html>
