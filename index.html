<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <title>Togven</title>
</head>
<body>

    <!-- طبقة الخلفية المتحركة -->
    <div class="background-animation">
        <div class="clouds-container day-elements">
            <div class="cloud cloud1"></div>
            <div class="cloud cloud2"></div>
            <div class="cloud cloud3"></div>
            <div class="cloud cloud4"></div>
        </div>
        <div class="night-elements" style="display: none;">
            <div class="moon"></div>
            <div class="star star1"></div>
            <div class="star star2"></div>
            <div class="star star3"></div>
            <div class="star star4"></div>
            <div class="star star5"></div>
            <div class="star star6"></div>
        </div>
    </div>

    <!-- رأس التطبيق -->
    <div class="header">
        <button class="icon-btn" id="soundToggleBtn" title="تفعيل الصوت"><i id="soundIcon" class="fas fa-volume-mute"></i></button>
        <button class="icon-btn" id="musicToggleBtn" title="موسيقى الخلفية"><i id="musicIcon" class="fas fa-music-slash"></i></button>
        <button class="icon-btn" id="profileBtn" title="ملفي الشخصي"><i class="fas fa-user-astronaut"></i></button>
        <button class="icon-btn" id="settingsBtn" title="الإعدادات"><i class="fas fa-cog"></i></button>
        <button class="icon-btn" id="themeToggleBtn"><i id="theme-icon" class="fas fa-moon"></i></button>
        <div class="cart-icon-wrapper">
            <button class="icon-btn" id="cartIconBtn" title="عربة التسوق">
                <i class="fas fa-shopping-cart"></i>
                <span id="cartCount" class="cart-count">0</span>
            </button>
        </div>
        <input type="text" id="search-input" placeholder="ابحث عما تريد...">
    </div>

    <!-- شريط اللعب -->
    <div class="gamification-bar" id="gamificationBar">
        <div class="xp-info">
            <i class="fas fa-star"></i>
            <span id="xpPoints">0</span> XP
        </div>
        <div class="progress-container">
            <div class="xp-progress" id="xpProgress" style="width:0%"></div>
        </div>
        <div class="level-info">
            <i class="fas fa-trophy"></i>
            <span id="levelNum">1</span>
        </div>
    </div>
    <div class="badge-area" id="badgeArea"></div>

    <!-- أزرار التصنيفات -->
    <div class="chips-wrapper" id="category-chips">
        <div class="chip active" data-category="all">الكل</div>
    </div>

    <!-- حاوية المنتجات -->
    <div class="container product-container hero-view" id="main-container">
        <div class="loader" id="loader"><i class="fas fa-spinner fa-spin"></i> جاري تحميل المنتجات...</div>
    </div>

    <!-- الفوتر -->
    <div class="footer-cart" id="footer-cart">
        <div>
            <div style="font-size: 12px; opacity: 0.8;">الإجمالي النهائي:</div>
            <div style="font-size: 18px; font-weight: 800;"><span id="grand-total">0</span> ل.س</div>
        </div>
        <button id="whatsappBtn" class="whatsapp-send">إتمام الطلب <i class="fab fa-whatsapp"></i></button>
    </div>

    <!-- مودال البروفايل -->
    <div id="profileModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-close">&times;</span>
                <h2><i class="fas fa-user-astronaut"></i> ملفي الشخصي</h2>
            </div>
            <div class="modal-body">
                <div class="profile-level">
                    <div class="profile-avatar">
                        <i class="fas fa-crown"></i>
                    </div>
                    <div class="profile-stats">
                        <p><strong>المستوى:</strong> <span id="profileLevel">1</span></p>
                        <p><strong>نقاط الخبرة:</strong> <span id="profileXP">0</span> XP</p>
                        <div class="profile-progress">
                            <div class="profile-progress-bar" id="profileProgressBar" style="width:0%"></div>
                        </div>
                    </div>
                </div>
                <div class="profile-badges">
                    <h3>الشارات</h3>
                    <div id="profileBadgesList" class="badges-list">لا توجد شارات بعد</div>
                </div>
            </div>
        </div>
    </div>

    <!-- مودال الإعدادات -->
    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="settings-close">&times;</span>
                <h2><i class="fas fa-cog"></i> الإعدادات</h2>
            </div>
            <div class="modal-body">
                <div class="setting-item">
                    <label>🔊 المؤثرات الصوتية</label>
                    <button id="settingsSoundBtn" class="settings-btn">تفعيل</button>
                </div>
                <div class="setting-item">
                    <label>🎵 الموسيقى الخلفية</label>
                    <button id="settingsMusicBtn" class="settings-btn">تفعيل</button>
                </div>
                <div class="setting-item">
                    <label>📱 طريقة العرض</label>
                    <button id="settingsViewBtn" class="settings-btn">وضع القائمة</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js" type="module"></script>
</body>
</html>
